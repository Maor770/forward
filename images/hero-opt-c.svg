<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 440" role="img" aria-label="A ring of children of every background around a shared light">
  <defs>
    <radialGradient id="cGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbe9bd"/>
      <stop offset="60%" stop-color="#f2cf83" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f2cf83" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="220" cy="220" r="200" fill="url(#cGlow)"/>
  <!-- decorative ring -->
  <circle cx="220" cy="220" r="176" fill="none" stroke="#9e6e36" stroke-width="3" opacity="0.5"/>
  <circle cx="220" cy="220" r="168" fill="none" stroke="#c69556" stroke-width="1.5" opacity="0.6"/>

  <!-- central light / flame -->
  <g>
    <circle cx="220" cy="222" r="40" fill="#f6d873"/>
    <path d="M220 178 C236 200 242 216 220 256 C198 216 204 200 220 178 Z" fill="#fff4cf"/>
    <circle cx="220" cy="226" r="14" fill="#9e6e36" opacity="0.85"/>
  </g>

  <!-- ===== ring of child heads (varied), facing center ===== -->
  <!-- top: kippah -->
  <g transform="translate(220,70)">
    <circle r="26" fill="#e8b98c"/>
    <path d="M-20 -8 a20 15 0 0 1 40 0 Z" fill="#5b4a8a"/>
  </g>
  <!-- upper-right: short hair -->
  <g transform="translate(350,145)">
    <circle r="26" fill="#f2c9a0"/>
    <path d="M-24 -6 a24 20 0 0 1 48 0 l0 -3 a23 16 0 0 0 -48 0 Z" fill="#3a2c1c"/>
  </g>
  <!-- lower-right: cap -->
  <g transform="translate(350,295)">
    <circle r="26" fill="#d99a6c"/>
    <path d="M-25 -4 a25 21 0 0 1 50 0 Z" fill="#2f5d8a"/>
    <path d="M-1 -4 h34 a8 8 0 0 1 -8 6 h-26 Z" fill="#2f5d8a"/>
  </g>
  <!-- bottom: scarf / head covering -->
  <g transform="translate(220,370)">
    <path d="M-29 0 a29 29 0 0 1 58 0 l0 8 a29 22 0 0 1 -58 0 Z" fill="#1f7a6e"/>
    <circle r="22" fill="#8a5a3c"/>
    <path d="M-20 -2 a20 20 0 0 1 40 0 l0 8 a20 14 0 0 1 -40 0 Z" fill="#1f7a6e"/>
  </g>
  <!-- lower-left: curly hair -->
  <g transform="translate(90,295)">
    <circle r="26" fill="#a86b46"/>
    <path d="M-24 -8 a24 20 0 0 1 48 0 q-12 -14 -24 -6 q-12 -8 -24 6 Z" fill="#241a10"/>
  </g>
  <!-- upper-left: knit cap -->
  <g transform="translate(90,145)">
    <circle r="26" fill="#f2c9a0"/>
    <path d="M-24 -6 a24 22 0 0 1 48 0 l0 6 h-48 Z" fill="#b04432"/>
  </g>
</svg>
